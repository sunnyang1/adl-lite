# ADL Core Ontology — capability-lifecycle schema registry for L3 predicates, L4 actions, status graph, scopes.
# Single source of truth for Milestone 2a (Path A: OntologyManager, no OWL runtime).
# Inventory: examples/*.md, data/aml/concepts/, adl_lite/models.py, consensus.py
#
# Open questions (see docs/proposals/ONTOLOGY_MIDDLE_LAYER.md §8):
#   - Predicate closure: core set below; domain-specific extensions via future prefixes
#   - mapping_type: required on isomorphic-to when ADLValidator(strict=True)
#   - Action registry: closed core set (cf. predicates); each action declares
#     allowed_on types, required_params, preconditions, and side_effects

version: "0.2"
ontology_id: adl-core

classes:
  discovery:
  concept:
  relation:
  evidence:
  formal_seal:

# L3 relation predicates (closed core set from corpus)
predicates:
  isomorphic-to:
    description: Cross-domain structural alignment
    allowed_mapping_types: [topological, ontological, structural]
  specialisation-of:
    description: Narrower instance or subtype of target concept
    transitive: true
    allowed_mapping_types: [ontological]
  co-occurs-with:
    description: Statistical or operational co-occurrence
    symmetric: true
    allowed_mapping_types: [statistical]
  related-to:
    description: Generic domain association (weaker than isomorphic-to)
    allowed_mapping_types: [domain, ontological]
  analogical-to:
    description: Analogical mapping between domains
    allowed_mapping_types: [structural, ontological]
  analogical-transfer:
    description: Mechanism-level analogical transfer (AML corpus)
    allowed_mapping_types: [ontological]
  dual-of:
    description: Dual or complementary concept pair
    allowed_mapping_types: [ontological]
  fork-of:
    description: Lineage link from fork to original concept
    allowed_mapping_types: [ontological]
  mitigated-by:
    description: Mitigation or remediation relationship
    allowed_mapping_types: [engineering]
  indexed-phrase:
    description: Lexical anchor to warm-index phrase id
    allowed_mapping_types: [lexical]

# mapping_type values observed in corpus (informational; not strict-validated in 2a)
mapping_types:
  - topological
  - ontological
  - structural
  - engineering
  - statistical
  - domain
  - lexical

# Mirrors ConsensusEngine._is_valid_transition (consensus.py)
status_transitions:
  provisional: [validated, deprecated, forked, archived]
  validated: [deprecated, forked, archived]
  forked: [validated, deprecated, archived]
  deprecated: [archived]
  archived: []

scopes:
  prefixes: [public, private, user, shared]

# L4 action registry (closed core set, Milestone 2d)
# Each action is a declared operation on ADL capabilities with optional
# preconditions (validated at parse time) and side effects (dispatched
# by ActionExecutor at runtime).
actions:
  register:
    description: Register a new concept into the ontology
    allowed_on: [discovery, concept]
    triggers_transition: null → provisional
    required_params: []
    preconditions: []
    side_effects: []

  validate:
    description: Validator agent approves a concept
    allowed_on: [discovery, concept]
    triggers_transition: provisional → validated
    required_params: []
    preconditions:
      - field: confidence
        comparator: gte
        value: 0.5
      - field: status
        comparator: eq
        value: provisional
      - field: validator_count
        comparator: gte
        value: 1
        description: At least 1 distinct validator required (N_min ≥ 1; configurable)
    side_effects: []

  fork:
    description: Fork a concept as competing interpretation
    allowed_on: [discovery, concept]
    triggers_transition: provisional → forked
    required_params: [fork_id, rationale]
    preconditions:
      - field: status
        comparator: eq
        value: provisional
    side_effects: []

  deprecate:
    description: Mark concept as deprecated
    allowed_on: [discovery, concept]
    triggers_transition: validated → deprecated
    required_params: [reason]
    preconditions:
      - field: status
        comparator: eq
        value: validated
    side_effects: []

  archive:
    description: Archive a deprecated or obsolete concept
    allowed_on: [discovery, concept]
    triggers_transition: deprecated → archived
    required_params: []
    preconditions:
      - field: status
        comparator: in
        value: [provisional, validated, forked, deprecated]
    side_effects: []

  announce:
    description: Broadcast concept to a chat room
    allowed_on: [discovery, concept, relation, evidence, formal_seal]
    triggers_transition: null
    required_params: [chat_id]
    preconditions: []
    side_effects: []

  publish:
    description: Publish concept to Feishu knowledge base
    allowed_on: [discovery, concept]
    triggers_transition: null
    required_params: [wiki_space]
    preconditions: []
    side_effects: []

  sync_dashboard:
    description: Sync concept status to dashboard
    allowed_on: [discovery, concept]
    triggers_transition: null
    required_params: [sheet_id]
    preconditions: []
    side_effects: []

  listen:
    description: Ingest external feedback as a concept action
    allowed_on: [discovery, concept]
    triggers_transition: null
    required_params: [feedback_file]
    preconditions: []
    side_effects: []

# Collusion resistance: minimum distinct validators required for VALIDATE
# Paper §5.2.3: N_min ≥ 2 recommended for production deployments
# Current default: 1 (development / single-agent mode)
collusion_resistance:
  min_distinct_validators: 1
  description: Minimum distinct validators for VALIDATE transition
